name: Feature request
description: Propose an adapter or contract improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What auditable collection problem should this solve?
    validations:
      required: true
  - type: textarea
    id: access
    attributes:
      label: Source and access policy
      description: For a new adapter, identify the documented API/feed/access surface and failure behavior.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Boundary
      options:
        - label: The proposal does not require bypassing authentication, CAPTCHAs, rate limits, or access controls.
          required: true
