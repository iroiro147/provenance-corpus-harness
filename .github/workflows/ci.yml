name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and development tools
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Lint
        run: ruff check . && ruff format --check .
      - name: Test
        run: pytest -q
      - name: Verify dependencies
        run: python -m pip check && pip-audit
      - name: Build and inspect distributions
        run: python -m build && python -m twine check dist/*
      - name: Smoke-test console command
        run: corpus-harness --version
